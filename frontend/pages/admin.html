<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Command Center | EduFeedback</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; }
        .admin-wrapper { max-width: 1300px; margin: 2rem auto; padding: 0 2rem; }
        
        /* Stats Dashboard */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { 
            background: #fff; padding: 2rem; border-radius: 1.5rem; border: 1px solid var(--border);
            display: flex; align-items: center; gap: 1.5rem; transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .stat-icon { width: 60px; height: 60px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; background: rgba(79, 70, 229, 0.1); color: var(--primary); }
        .stat-info .value { font-size: 1.75rem; font-weight: 800; color: var(--text); font-family: 'Outfit', sans-serif; }

        /* Sidebar Tabs */
        .admin-layout { display: grid; grid-template-columns: 280px 1fr; gap: 2rem; }
        .admin-nav { background: #fff; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid var(--border); height: fit-content; }
        .nav-item { 
            display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 1rem; 
            cursor: pointer; font-weight: 700; color: var(--text-muted); transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: #fff; }

        /* Modules */
        .content-card { background: #fff; padding: 2.5rem; border-radius: 2rem; border: 1px solid var(--border); display: none; }
        .content-card.active { display: block; animation: fadeInUp 0.5s ease-out; }

        /* Form Styling */
        .reg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
        .full-row { grid-column: span 2; }

        .ticket-item { 
            background: #f8fafc; border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 1.5rem; 
            border: 1px solid #f1f5f9; display: grid; grid-template-columns: auto 1fr auto; gap: 1.5rem;
        }
        .badge { padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 800; }
        .badge-Open { background: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">EduFeedback</div>
            <div class="nav-links"><a href="#" onclick="logout()" class="btn-outline">Sign Out</a></div>
        </nav>
    </header>

    <main class="admin-wrapper">
        <div class="admin-layout">
            <aside class="admin-nav">
                <div class="nav-item active" onclick="showTab('tickets', this)"><i class="fas fa-ticket-alt"></i> Tickets</div>
                <div class="nav-item" onclick="showTab('users', this)"><i class="fas fa-users-cog"></i> User Management</div>
                <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #f1f5f9;">
                <a href="analytics.html" style="text-decoration: none;"><div class="nav-item"><i class="fas fa-chart-pie"></i> Analytics</div></a>
                <div class="nav-item" onclick="exportReport()"><i class="fas fa-file-csv"></i> Export Data</div>
            </aside>

            <div class="admin-main">
                <!-- Dashboard Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-clipboard-list"></i></div>
                        <div class="stat-info"><h4>Total Tickets</h4><div class="value" id="total-count">0</div></div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon" style="color: #d97706; background: rgba(245, 158, 11, 0.1);"><i class="fas fa-clock"></i></div>
                        <div class="stat-info"><h4>Unresolved</h4><div class="value" id="unresolved-count">0</div></div>
                    </div>
                </div>

                <!-- Tickets Module -->
                <div id="tickets-tab" class="content-card active">
                    <h2 style="font-family: 'Outfit', sans-serif; margin-bottom: 2rem; font-weight: 900;">Manage Reports</h2>
                    <div id="tickets-list">Loading tickets...</div>
                </div>

                <!-- User Management Module -->
                <div id="users-tab" class="content-card">
                    <h2 style="font-family: 'Outfit', sans-serif; margin-bottom: 0.5rem; font-weight: 900;">Register Stakeholder</h2>
                    <p style="color: var(--text-muted); margin-bottom: 2.5rem;">Create new accounts for students, teachers, or staff.</p>
                    
                    <form id="reg-form">
                        <div class="reg-grid">
                            <div class="form-group">
                                <label>Stakeholder Role</label>
                                <select id="reg-role" onchange="updateRegFields(this.value)" required>
                                    <option value="student">Student</option>
                                    <option value="teacher">Teacher</option>
                                    <option value="employee">Employee</option>
                                    <option value="parent">Parent</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label id="id-label">USN / ID</label>
                                <input type="text" id="reg-id" placeholder="Enter ID" required>
                            </div>
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="reg-name" required>
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="reg-email" required>
                            </div>
                            <div class="form-group" id="dept-group">
                                <label>Department</label>
                                <select id="reg-dept"></select>
                            </div>
                            <div class="form-group" id="year-group">
                                <label>Year</label>
                                <input type="number" id="reg-year" min="1" max="4" value="1">
                            </div>
                            <div class="form-group full-row">
                                <label>Set Password</label>
                                <input type="password" id="reg-pass" placeholder="Create a temporary password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn" style="width: 100%; border-radius: 1.25rem; padding: 1.25rem;">
                            Create Account <i class="fas fa-user-plus" style="margin-left: 0.5rem;"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script>
        const auth = checkAuth('admin');
        let departments = [];

        if (auth) {
            initialize();
        }

        function showTab(tabId, el) {
            document.querySelectorAll('.content-card').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId + '-tab').classList.add('active');
            el.classList.add('active');
        }

        function updateRegFields(role) {
            const idLabel = document.getElementById('id-label');
            const deptGroup = document.getElementById('dept-group');
            const yearGroup = document.getElementById('year-group');

            deptGroup.style.display = (role === 'parent') ? 'none' : 'block';
            yearGroup.style.display = (role === 'student') ? 'block' : 'none';

            if (role === 'student') idLabel.innerText = 'USN';
            else if (role === 'parent') idLabel.innerText = 'Parent ID';
            else idLabel.innerText = 'Employee ID';
        }

        async function initialize() {
            const metaRes = await fetch(`${API_URL}/metadata`);
            const metaData = await metaRes.json();
            departments = metaData.departments;
            
            const regDept = document.getElementById('reg-dept');
            departments.forEach(d => regDept.innerHTML += `<option value="${d}">${d}</option>`);
            
            loadTickets();
            loadStats();
            updateRegFields('student');
        }

        async function loadStats() {
            const res = await fetch(`${API_URL}/admin/analytics/unresolved`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const data = await res.json();
            document.getElementById('unresolved-count').innerText = data.count || 0;
        }

        async function loadTickets() {
            const res = await fetch(`${API_URL}/admin/tickets`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            });
            const tickets = await res.json();
            const list = document.getElementById('tickets-list');
            list.innerHTML = '';
            document.getElementById('total-count').innerText = tickets.length;

            tickets.forEach(t => {
                const isAnon = t.is_anonymous === 1 || t.is_anonymous === true;
                const div = document.createElement('div');
                div.className = 'ticket-item';
                div.innerHTML = `
                    <div style="font-size: 1.5rem; color: var(--primary);"><i class="fas ${isAnon ? 'fa-user-secret' : 'fa-user'}"></i></div>
                    <div>
                        <div style="font-weight: 800; font-family: 'Outfit';">${t.category} <span class="badge badge-${t.status}">${t.status}</span></div>
                        <div style="font-size: 0.8rem; color: var(--text-muted); margin: 0.25rem 0;">ID: ${isAnon ? 'Anonymous' : t.stakeholder_id} | ${formatDate(t.date)}</div>
                        <div style="font-size: 0.9rem; color: #475569; background: #fff; padding: 0.75rem; border-radius: 0.75rem; border: 1px solid #f1f5f9; margin-top: 0.5rem;">${t.description}</div>
                    </div>
                    <div style="min-width: 200px;">
                        <select id="status-${t.ticket_id}" style="margin-bottom: 0.5rem;">
                            <option value="Open" ${t.status === 'Open' ? 'selected' : ''}>Open</option>
                            <option value="In Progress" ${t.status === 'In Progress' ? 'selected' : ''}>In Progress</option>
                            <option value="Resolved" ${t.status === 'Resolved' ? 'selected' : ''}>Resolved</option>
                        </select>
                        <button onclick="updateTicket(${t.ticket_id})" class="btn" style="width: 100%; padding: 0.4rem; font-size: 0.8rem;">Update</button>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function updateTicket(id) {
            const status = document.getElementById(`status-${id}`).value;
            const res = await fetch(`${API_URL}/admin/tickets/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}` },
                body: JSON.stringify({ status })
            });
            if (res.ok) { alert('Updated'); loadTickets(); loadStats(); }
        }

        document.getElementById('reg-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = {
                role: document.getElementById('reg-role').value,
                identifier: document.getElementById('reg-id').value,
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                department: document.getElementById('reg-dept').value,
                year: parseInt(document.getElementById('reg-year').value),
                password: document.getElementById('reg-pass').value
            };

            const res = await fetch(`${API_URL}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (res.ok) { alert('Stakeholder registered successfully!'); e.target.reset(); }
            else { alert('Registration failed. ID or Email might exist.'); }
        });
    </script>
</body>
</html>
