<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduFeedback</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="logo">EduFeedback</div>
            <div class="nav-links">
                <a href="../index.html" class="btn back-btn">← Back to Home</a>
            </div>
        </nav>
    </header>

    <main class="auth-wrapper">
        <div class="auth-container">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Please enter your details to sign in</p>
            </div>
            
            <div id="alert" class="alert alert-danger"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="identifier">User ID</label>
                    <input type="text" id="identifier" placeholder="e.g. 1RV22CS034 or EMP102" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="form-group">
                    <label for="role">Account Role</label>
                    <select id="role" required>
                        <option value="" disabled selected>Select your role</option>
                        <option value="student">Student</option>
                        <option value="parent">Parent</option>
                        <option value="teacher">Teacher</option>
                        <option value="employee">Employee</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.875rem; color: var(--text-muted);">
                <p>New here? Contact your administrator for access.</p>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const identifier = document.getElementById('identifier').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const alertDiv = document.getElementById('alert');
            const submitBtn = e.target.querySelector('button');

            // Visual feedback
            submitBtn.innerText = 'Signing in...';
            submitBtn.style.opacity = '0.7';
            submitBtn.disabled = true;

            try {
                const response = await fetch('https://edufeedback-system-jc9d.onrender.com/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ role, identifier, password })
                });

                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = `${role}.html`;
                } else {
                    alertDiv.innerText = data.error || 'Invalid credentials';
                    alertDiv.style.display = 'block';
                    submitBtn.innerText = 'Sign In';
                    submitBtn.style.opacity = '1';
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error('Login error:', err);
                alertDiv.innerText = 'Server error. Please try again later.';
                alertDiv.style.display = 'block';
                submitBtn.innerText = 'Sign In';
                submitBtn.style.opacity = '1';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
