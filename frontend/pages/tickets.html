<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Tickets | EduFeedback</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .tickets-container { max-width: 1000px; margin: 3rem auto; background: #fff; padding: 2rem; border-radius: 1rem; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; margin-top: 1.5rem; }
        th { background: #f8fafc; text-align: left; padding: 1rem; border-bottom: 2px solid #e2e8f0; color: #64748b; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 1rem; border-bottom: 1px solid #e2e8f0; vertical-align: middle; }
        .status-badge { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-Open { background: #dbeafe; color: #1e40af; }
        .status-Under-Review { background: #fef3c7; color: #92400e; }
        .status-In-Progress { background: #e0e7ff; color: #3730a3; }
        .status-Resolved { background: #d1fae5; color: #065f46; }
        .status-Closed { background: #f1f5f9; color: #475569; }
        .view-btn { padding: 0.4rem 0.8rem; border-radius: 0.4rem; border: 1px solid var(--primary); color: var(--primary); background: transparent; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
        .view-btn:hover { background: var(--primary); color: #fff; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        .modal-content { background: #fff; max-width: 600px; margin: 5rem auto; padding: 2rem; border-radius: 1rem; position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.5rem; color: #64748b; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">EduFeedback</div>
            <ul class="nav-links">
                <li><a id="back-link" href="#">Back to Dashboard</a></li>
                <li><a href="#" onclick="logout()" class="btn">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="tickets-container">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2>My Complaint Tickets</h2>
                <a href="feedback.html" class="btn">+ New Feedback</a>
            </div>
            
            <table id="tickets-table">
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tickets-body">
                    <!-- Data will load here -->
                </tbody>
            </table>
        </div>
    </main>

    <div id="details-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modal-title">Ticket Details</h3>
            <hr style="margin: 1rem 0; border: 0; border-top: 1px solid #e2e8f0;">
            <div id="modal-body">
                <!-- Details will load here -->
            </div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        if (!token || !user) window.location.href = 'login.html';
        document.getElementById('back-link').href = `${user.role}.html`;

        async function loadTickets() {
            const res = await fetch(`${API_URL}/feedback/my`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const body = document.getElementById('tickets-body');
            body.innerHTML = '';

            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding: 2rem; color: #64748b;">No tickets found. Submit feedback to see them here.</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                const statusClass = item.status.replace(/\s+/g, '-');
                tr.innerHTML = `
                    <td>#${item.feedback_id}</td>
                    <td><strong>${item.category}</strong></td>
                    <td><span class="status-badge status-${statusClass}">${item.status}</span></td>
                    <td>${new Date(item.date).toLocaleDateString()}</td>
                    <td><button class="view-btn" onclick='showDetails(${JSON.stringify(item).replace(/'/g, "&apos;")})'>Track</button></td>
                `;
                body.appendChild(tr);
            });
        }

        function showDetails(item) {
            const modal = document.getElementById('details-modal');
            const modalBody = document.getElementById('modal-body');
            
            modalBody.innerHTML = `
                <div style="margin-bottom: 1rem;">
                    <strong>Category:</strong> ${item.category}<br>
                    <strong>Date Submitted:</strong> ${formatDate(item.date)}<br>
                    <strong>Current Status:</strong> <span class="status-badge status-${item.status.replace(/\s+/g, '-')}">${item.status}</span>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <strong>Your Description:</strong>
                    <p style="margin-top: 0.5rem; color: #475569; background: #f8fafc; padding: 1rem; border-radius: 0.5rem;">${item.description}</p>
                </div>
                ${item.resolution ? `
                    <div style="padding: 1rem; background: #ecfdf5; border: 1px solid #34d399; border-radius: 0.5rem;">
                        <strong style="color: #065f46;">Resolution:</strong>
                        <p style="margin-top: 0.5rem; color: #064e3b;">${item.resolution}</p>
                    </div>
                ` : `
                    <p style="color: #64748b; font-style: italic;">Admin is currently working on this ticket. You will be notified of updates.</p>
                `}
            `;
            modal.style.display = 'block';
        }

        function closeModal() {
            document.getElementById('details-modal').style.display = 'none';
        }

        loadTickets();
    </script>
</body>
</html>
